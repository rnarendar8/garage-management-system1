@if (errorMessage) {

<div class="error-box">
  {{ errorMessage }}
</div>

} @else {

<!-- Existing customers content -->
}

<h2>{{ isEditMode ? 'Update Customer' : 'Add Customer' }}</h2>



<form (ngSubmit)="addCustomer()" #customerForm="ngForm">

  <input
    type="text"
    placeholder="First Name"
    [(ngModel)]="newCustomer.firstName"
    name="firstName"
    required
  />

  <input
    type="text"
    placeholder="Last Name"
    [(ngModel)]="newCustomer.lastName"
    name="lastName"
    required
  />

  <input
    type="text"
    placeholder="Phone"
    [(ngModel)]="newCustomer.phone"
    name="phone"
    required
  />

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="newCustomer.email"
    name="email"
  />

  <input
    type="text"
    placeholder="Address"
    [(ngModel)]="newCustomer.address"
    name="address"
  />

  <button type="submit" [disabled]="customerForm.invalid">
    {{ isEditMode ? 'Update Customer' : 'Add Customer' }}
  </button>

  <button type="button" *ngIf="isEditMode" (click)="resetForm()">
    Cancel
  </button>

</form>

<hr />

<h2>Customers List</h2>

<table border="1" width="100%" cellpadding="8">

  <thead>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Email</th>
    <th>Address</th>
    <th>Actions</th>
  </tr>
  </thead>

  <tbody>
  <tr *ngFor="let c of customers">
    <td>{{ c.id }}</td>
    <td>{{ c.firstName }} {{ c.lastName }}</td>
    <td>{{ c.phone }}</td>
    <td>{{ c.email }}</td>
    <td>{{ c.address }}</td>
    <td>
      <button (click)="editCustomer(c)">Edit</button>
      <button (click)="deleteCustomer(c.id!)">Delete</button>
    </td>
  </tr>
  </tbody>

</table>
